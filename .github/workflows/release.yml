name: release

# Build the `lsdoc-parse` binary for the common platforms and attach it to the
# GitHub Release for a pushed `v*` tag. tools/graph-check.mjs downloads these so
# users can run the graph check with only Node.js installed — no Rust, no C
# compiler. Cut a release with:  git tag v0.4.1 && git push origin v0.4.1
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build and upload assets for"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    # Fail a leg fast if a hosted runner never gets assigned, rather than letting it
    # sit queued until the 24h workflow limit cancels the whole run (which is what
    # the retired macos-13 Intel runner did to v0.5.2/v0.5.3/v0.5.4).
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset: lsdoc-parse-linux-x64
            bin: lsdoc-parse
          - os: ubuntu-24.04-arm
            asset: lsdoc-parse-linux-arm64
            bin: lsdoc-parse
          # Intel macOS: cross-compiled on the Apple-Silicon runner because GitHub
          # retired the macos-13 (x64) hosted runner — jobs targeting it queue
          # forever. lsdoc is pure Rust (no C deps), so this cross build is clean.
          - os: macos-14
            asset: lsdoc-parse-macos-x64
            bin: lsdoc-parse
            target: x86_64-apple-darwin
          - os: macos-14
            asset: lsdoc-parse-macos-arm64
            bin: lsdoc-parse
          - os: windows-latest
            asset: lsdoc-parse-windows-x64.exe
            bin: lsdoc-parse.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # NOTE: CI uses the standard rustup toolchain — do NOT source scripts/env.sh
      # here; that file targets the /aux dev box only.
      - name: Build lsdoc-parse
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            rustup target add "${{ matrix.target }}"
            cargo build --release --target "${{ matrix.target }}" --bin lsdoc-parse
            echo "BIN_DIR=target/${{ matrix.target }}/release" >> "$GITHUB_ENV"
          else
            cargo build --release --bin lsdoc-parse
            echo "BIN_DIR=target/release" >> "$GITHUB_ENV"
          fi

      - name: Stage asset
        shell: bash
        run: |
          mkdir -p dist
          cp "$BIN_DIR/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/${{ matrix.asset }}
          fail_on_unmatched_files: true
